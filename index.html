<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdOS - Chepauk Stadium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="AI Graph Routing System mapping exact stadium densities to safely process intent actions.">
</head>
<body>
    <div class="app-container">
        <header class="topbar">
            <div class="logo">
                <span class="pulse-dot"></span>
                <h1>CrowdOS</h1>
            </div>
            <div class="server-status">
                <span class="status-indicator"></span> Deep AI Processing Matrix
            </div>
        </header>
        
        <main class="grid-layout">
            <!-- PART 1 & 3: NEW INSIGHTS PANEL -->
            <section class="panel insights-panel">
                <div class="panel-header">
                    <h2>Live Intelligence</h2>
                    <span class="badge" style="background:rgba(0,230,118,0.1); color:#00E676;">Real-Time</span>
                </div>
                
                <div class="insight-section">
                    <h3 class="section-title">Live Wait Times</h3>
                    <div id="wait-times-container" class="live-list">
                        <!-- Loaded via JS -->
                    </div>
                </div>
                
                <div class="insight-section">
                    <h3 class="section-title">System Status</h3>
                    <div id="system-status" class="live-status-box"></div>
                </div>
            
                <div class="insight-section">
                    <h3 class="section-title">Smart Concessions</h3>
                    <div id="smart-concessions-container" class="live-list">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </section>

            <section class="panel map-panel">
                <div class="panel-header">
                    <h2>Chepauk Stadium Digital Twin</h2>
                    <span class="badge ai-badge">SVG Spatial Modeling</span>
                </div>
                <div id="svg-container" class="map-view">
                    <svg id="stadium-map" viewBox="0 0 1000 1000" width="100%" height="100%"></svg>
                </div>
            </section>
            
            <section class="panel interaction-panel">
                <div class="panel-header">
                    <h2>Live Alerts Feed</h2>
                    <span class="badge">System AI</span>
                </div>
                <div id="live-alerts-feed" class="live-list feed-scroller" style="max-height: 250px; overflow-y: auto;" role="alert" aria-live="assertive">
                    <div class="alert-msg">System initializing...</div>
                </div>

                <div class="panel-header" style="border-top: 1px solid var(--glass-border);">
                    <h2>Decision Assistant</h2>
                    <span class="badge ai-badge">AI Core Active</span>
                </div>
                
                <div class="chat-container">
                    <div class="text-input-wrapper">
                        <input type="text" id="text-intent" class="intent-input" placeholder="Type instruction (e.g. 'I want food')" />
                        <button id="btn-submit-text" class="btn-micro">SEND</button>
                    </div>
                    <div id="assistant-console" class="console-logs" role="log" aria-live="polite"></div>
                </div>

                <div class="controls-area">
                    <div class="input-group">
                        <label for="user-location">Environment Origin Node:</label>
                        <select id="user-location">
                            <option value="" disabled selected>Select starting location...</option>
                        </select>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="btn-food" class="btn primary" aria-label="Find best food stalls">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
                            Find Food
                        </button>
                        <button id="btn-exit" class="btn danger" aria-label="Find safest exit route">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            Analyze Safest Exit
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
